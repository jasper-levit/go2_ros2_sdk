# Unitree Go2 ROS 2 Jazzy (Ubuntu 24.04) - WEBRTC connection
# Usage: ROBOT_IP=<robot_ip> docker compose up --build
# Or: set ROBOT_IP and CONN_TYPE in .env

services:
  unitree_ros:
    build:
      context: ..
      dockerfile: dev_env/Dockerfile
    environment:
      - ROBOT_IP=${ROBOT_IP}
      - CONN_TYPE=${CONN_TYPE:-webrtc}
      - WEBRTC_SERVER_HOST=0.0.0.0
      - WEBRTC_SERVER_PORT=${WEBRTC_SERVER_PORT:-9991}
      - DISPLAY=${DISPLAY:-}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${HOME}/.Xauthority:/root/.Xauthority:rw
    network_mode: "host"
    privileged: true
    devices:
      - /dev/input:/dev/input
    restart: unless-stopped
